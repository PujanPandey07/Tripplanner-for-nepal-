{% extends "my_app/base.html" %}
{% block title %}Delete conversation{% endblock %}

{% block main %}
    <div class="main-content" style="align-items: center; justify-content: center;">
        <div class="content-inner" style="text-align: center; max-width: 420px;">
            <h3>Delete this conversation?</h3>
            <p style="color: var(--text-muted);">
                "{{ conversation.title|default:"This conversation" }}" and all its messages
                will be permanently deleted. This can't be undone.
            </p>
            <form method="post" style="display: flex; gap: 10px; justify-content: center; margin-top: 16px;">
                {% csrf_token %}
                <button type="submit" style="background: #c0392b; border: none; color: white; padding: 10px 18px; border-radius: 6px; cursor: pointer;">
                    Delete
                </button>
                <a href="{% url 'conversation_detail' conversation.id %}"
                   style="padding: 10px 18px; border-radius: 6px; border: 1px solid var(--border); color: var(--text-primary); text-decoration: none;">
                    Cancel
                </a>
            </form>
        </div>
    </div>
{% endblock %}
